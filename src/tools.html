<!DOCTYPE html>
<html lang="en-AU">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Frequency Tool</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #FFFFFF;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            color: #333;
        }

        /* Main content area needs to grow to push footer down */
        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .container {
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
        }

        h3 {
            margin-top: 0;
            color: #2c3e50;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }

        #letterCounterTextBox {
            width: 100%;
            padding: 12px;
            margin: 15px 0;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        #letterCounterTextBox:focus {
            outline: none;
            border-color: #3498db;
        }

        .result-item {
            display: flex;
            align-items: center;
            margin: 8px 0;
            font-family: monospace;
            font-size: 1.1rem;
        }

        .char-label {
            width: 40px;
            font-weight: bold;
        }

        .count-bar {
            height: 18px;
            background-color: #3498db;
            border-radius: 4px;
            margin: 0 10px;
            transition: width 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #displayResults {
            max-height: 350px;
            overflow-y: auto;
            margin-top: 10px;
            padding-right: 5px;
        }

        .empty-msg {
            color: #999;
            font-style: italic;
        }
    </style>
</head>
<body>

<div id="header"></div>

<main>
    <div class="container">
        <h3>Character Frequency</h3>

        <label for="letterCounterTextBox">Enter your text below:</label>
        <input type="text" id="letterCounterTextBox" placeholder="Type here to count letters...">

        <div id="displayResults">
            <div class="empty-msg">Start typing to see the analysis...</div>
        </div>
    </div>
</main>

<div id="footer"></div>

<script>
    // 1. Function to fetch and inject Header/Footer
    async function loadTemplate(id, url) {
        try {
            const response = await fetch(url);
            if (response.ok) {
                const html = await response.text();
                document.getElementById(id).innerHTML = html;
            }
        } catch (error) {
            console.error(`Error loading ${url}:`, error);
        }
    }

    // Initialize components (update filenames as needed)
    loadTemplate('header', 'header.html');
    loadTemplate('footer', 'footer.html');

    // 2. Character Counting Logic
    const inputField = document.getElementById('letterCounterTextBox');
    const displayArea = document.getElementById('displayResults');

    function countLetters(inputString) {
        const letterCounter = new Map();
        for (const char of inputString) {
            if (char === ' ') continue;
            letterCounter.set(char, (letterCounter.get(char) || 0) + 1);
        }
        return Array.from(letterCounter.entries()).sort((a, b) => b[1] - a[1]);
    }

    inputField.addEventListener('input', () => {
        const text = inputField.value;
        const results = countLetters(text);

        if (text.length === 0) {
            displayArea.innerHTML = '<div class="empty-msg">Start typing to see the analysis...</div>';
            return;
        }

        const maxCount = results.length > 0 ? results[0][1] : 1;

        displayArea.innerHTML = results.map(([char, count]) => {
            const width = (count / maxCount) * 100;
            // Escaping the character display for safety
            const safeChar = char === '\n' ? '↵' : char;
            return `
                    <div class="result-item">
                        <span class="char-label">'${safeChar}'</span>
                        <div class="count-bar" style="width: ${width * 0.6}%"></div>
                        <span>${count}</span>
                    </div>
                `;
        }).join('');
    });
</script>

<script src="format.js"></script>
</body>
</html>
